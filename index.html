
<script>
(function() {
  var main    = document.getElementById('main-site');
  var arts    = document.querySelectorAll('.article-page');
  var backBtn = document.getElementById('navBackBtn');
  var navLnk  = document.querySelector('.nav-links');
  var burger  = document.getElementById('hamburger');
  var drawer  = document.getElementById('navDrawer');
  var ART   = ['les-regles-or-colocation','bail-solidaire-bail-individuel','colocation-aventure-humaine','5-cles-louer-sereinement'];
  var LEGAL = ['cgu','confidentialite','mentions'];

  function hideAll() {
    if (main) main.style.display = 'none';
    arts.forEach(function(p){ p.style.display='none'; });
    LEGAL.forEach(function(s){ var e=document.getElementById('page-'+s); if(e) e.style.display='none'; });
  }
  function navState(home) {
    if (backBtn) backBtn.classList[home?'remove':'add']('visible');
    if (navLnk)  navLnk.style.display  = home ? '' : 'none';
    if (burger)  burger.style.display  = home ? '' : 'none';
  }

  window.showMainSite = function() {
    hideAll(); if (main) main.style.display=''; navState(true);
    window.scrollTo(0,0); history.pushState({p:'home'},'',window.location.pathname);
    document.title = "Minggle — Application Colocation Affinitaire";
  };
  window.showArticle = function(slug) {
    var page=document.getElementById('page-'+slug); if(!page) return;
    hideAll(); page.style.display=''; navState(false);
    window.scrollTo(0,0); history.pushState({p:'art',s:slug},'','#'+slug);
    var t=page.querySelector('.a-title'); if(t) document.title=t.textContent+' | Minggle Blog';
  };
  window.showLegal = function(slug) {
    var page=document.getElementById('page-'+slug); if(!page) return;
    hideAll(); page.style.display=''; navState(false);
    window.scrollTo(0,0); history.pushState({p:'legal',s:slug},'','#'+slug);
    var T={cgu:'CGU | Minggle',confidentialite:'Politique de confidentialité | Minggle',mentions:'Mentions légales | Minggle'};
    document.title=T[slug]||'Minggle';
  };

  window.addEventListener('popstate',function(e){
    var s=e.state;
    if(!s||s.p==='home') showMainSite();
    else if(s.p==='art') showArticle(s.s);
    else if(s.p==='legal') showLegal(s.s);
  });
  window.addEventListener('DOMContentLoaded',function(){
    var h=location.hash.replace('#','');
    if(ART.indexOf(h)>-1) showArticle(h);
    else if(LEGAL.indexOf(h)>-1) showLegal(h);
    else history.replaceState({p:'home'},'',location.pathname);
  });

  window.openDrawer=function(){ if(burger) burger.classList.add('open'); if(drawer) drawer.classList.add('open'); document.body.style.overflow='hidden'; };
  window.closeDrawer=function(){ if(burger) burger.classList.remove('open'); if(drawer) drawer.classList.remove('open'); document.body.style.overflow=''; };
  if(burger) burger.addEventListener('click',function(){ drawer&&drawer.classList.contains('open')?closeDrawer():openDrawer(); });
  if(drawer) drawer.addEventListener('click',function(e){ if(e.target===drawer) closeDrawer(); });

  window.toggleFaq=function(btn){
    var item=btn.closest('.faq-item'),open=item.classList.contains('open');
    document.querySelectorAll('.faq-item').forEach(function(i){ i.classList.remove('open'); });
    if(!open) item.classList.add('open');
  };
  window.setLevel=function(n,el){
    document.querySelectorAll('.level-card').forEach(function(c){ c.style.outline='none'; });
    var C={1:'#888780',2:'#BA7517',3:'#6488E5',4:'#27AE60'};
    el.style.outline='2.5px solid '+C[n];
    var I={1:'<strong>Curieux (60–74%)</strong> — Des points communs existent.',2:'<strong>Affinité (75–84%)</strong> — Vos univers se croisent.',3:'<strong>Bonne Vibe (85–92%)</strong> — Fort matching de rythme.',4:'<strong>Coloc Idéal (93–100%)</strong> — Match exceptionnel.'};
    var t=document.getElementById('levelTooltip'); if(t) t.innerHTML='<p>'+I[n]+'</p>';
  };
  window.openProfileModal=function(id){
    var M=document.getElementById('modalContent'); if(!M) return;
    var N={lucas:'Lucas M.',camille:'Camille R.',theo:'Théo V.',sarah:'Sarah K.',raphael:'Raphaël D.'};
    var A={lucas:'22 ans · Paris 11e',camille:'25 ans · Lyon 2e',theo:'21 ans · Bordeaux',sarah:'24 ans · Toulouse',raphael:'27 ans · Lille'};
    var C={lucas:'94',camille:'88',theo:'81',sarah:'79',raphael:'75'};
    var B={lucas:'#EEF2FC',camille:'#FDE8EA',theo:'#FEF3E2',sarah:'#EDFAF3',raphael:'#EEF2FC'};
    var AV={lucas:'🧑‍🎓',camille:'👩‍💼',theo:'🎨',sarah:'👩‍🔬',raphael:'🧑‍💻'};
    M.innerHTML='<div class="ph-hero"><div class="ph-avatar-wrap"><div class="ph-avatar" style="background:'+B[id]+'">'+AV[id]+'</div><div class="ph-verified">✓</div></div><div class="ph-name">'+N[id]+'</div><div class="ph-meta">📍 '+A[id]+'</div><div class="ph-compat-badge">✦ '+C[id]+'% de compatibilité</div></div><div class="ph-cta-bar"><button class="ph-btn-primary" onclick="closeProfileModal();showMainSite();document.getElementById(\'telecharger\').scrollIntoView();">💬 Télécharger pour contacter</button><button class="ph-btn-ghost">❤️</button></div>';
    var m=document.getElementById('profileModal'); if(m){ m.classList.add('open'); document.body.style.overflow='hidden'; }
  };
  window.closeProfileModal=function(){ var m=document.getElementById('profileModal'); if(m) m.classList.remove('open'); document.body.style.overflow=''; };
  window.closeModal=function(e){ if(e.target===document.getElementById('profileModal')) closeProfileModal(); };
  window.openArticle=function(id){
    var T={regles:'Les règles d\'or d\'une bonne colocation',bail:'Bail solidaire ou bail individuel ?',aventure:'La colocation : une aventure humaine',proprio:'Les 5 clés pour louer sereinement'};
    var BG={regles:'#EEF2FC',bail:'#FDE8EA',aventure:'#FEF3E2',proprio:'#EDFAF3'};
    var IC={regles:'🏠',bail:'⚖️',aventure:'🤝',proprio:'🔑'};
    var CT={regles:'Vie en coloc',bail:'Juridique',aventure:'Colocation',proprio:'Propriétaires'};
    document.getElementById('bmThumb').textContent=IC[id]; document.getElementById('bmThumb').style.background=BG[id];
    document.getElementById('bmCat').textContent=CT[id]; document.getElementById('bmTitle').textContent=T[id];
    document.getElementById('bmReadTime').textContent='5 min';
    document.getElementById('bmContent').innerHTML='<p>Clique sur "Lire l\'article complet" pour découvrir le contenu.</p><div class="a-highlight">Pour lire l\'article complet, utilise le lien en haut de la page.</div>';
    var o=document.getElementById('blogModal'); if(o){ o.classList.add('open'); document.body.style.overflow='hidden'; }
  };
  window.closeBlogModalDirect=function(){ var m=document.getElementById('blogModal'); if(m) m.classList.remove('open'); document.body.style.overflow=''; };
  window.closeBlogModal=function(e){ if(e.target===document.getElementById('blogModal')) closeBlogModalDirect(); };

  window.addEventListener('scroll',function(){ var n=document.querySelector('nav'); if(n) n.style.boxShadow=window.scrollY>50?'0 4px 20px rgba(34,37,76,0.08)':'none'; });

  var obs=new IntersectionObserver(function(entries){ entries.forEach(function(e){ if(e.isIntersecting){ setTimeout(function(){ e.target.classList.add('visible'); },e.target.dataset.delay||0); obs.unobserve(e.target); } }); },{threshold:0.05});
  document.querySelectorAll('.step').forEach(function(el,i){ el.dataset.delay=i*100; obs.observe(el); });
  document.querySelectorAll('.showcase-card,.testi-card,.blog-card').forEach(function(el,i){ el.dataset.delay=(i%3)*120; obs.observe(el); });
  document.querySelectorAll('.disruption-eyebrow,.disruption-title,.disruption-body').forEach(function(el,i){ el.dataset.delay=i*100; obs.observe(el); });
  setTimeout(function(){ document.querySelectorAll('.step,.showcase-card,.testi-card,.blog-card,.disruption-eyebrow,.disruption-title,.disruption-body').forEach(function(el){ el.classList.add('visible'); }); },2500);

  var sObs=new IntersectionObserver(function(entries){ entries.forEach(function(entry){ if(!entry.isIntersecting) return; sObs.unobserve(entry.target); entry.target.querySelectorAll('.stat-number span').forEach(function(span){ var val=span.textContent,dur=1500; var num=parseInt(val.replace(/[^0-9.]/g,''))||0; var start=performance.now(); (function anim(now){ var p=Math.min((now-start)/dur,1),e2=1-Math.pow(1-p,3); span.textContent=Math.floor(e2*num).toLocaleString('fr-FR'); if(p<1) requestAnimationFrame(anim); })(performance.now()); }); }); },{threshold:0.3});
  document.querySelectorAll('.stats-strip').forEach(function(el){ sObs.observe(el); });

  document.addEventListener('keydown',function(e){ if(e.key==='Escape'){ closeProfileModal(); closeBlogModalDirect(); } });
})();
</script>
</body>
</html>
